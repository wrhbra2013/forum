<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - FORUMM</title>
<link rel="stylesheet" href="static/css/default.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="static/js/api.js"></script>
</head>
<body>

<div id="header-placeholder"></div>
<script>document.getElementById('header-placeholder').innerHTML = '<script src="components/header.js"><\/script>';</script>

<main class="main-content">
<div class="auth-page">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:16px">
      <svg viewBox="0 0 512 512" width="64" height="64" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 4px 12px rgba(108,92,231,0.3))">
        <defs><linearGradient id="cg1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6c5ce7"/><stop offset="100%" stop-color="#a29bfe"/></linearGradient><linearGradient id="cg2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00b894"/><stop offset="100%" stop-color="#00a381"/></linearGradient></defs>
        <circle cx="256" cy="256" r="240" fill="url(#cg1)"/>
        <path d="M160,210 Q160,170 200,170 L280,170 Q320,170 320,210 L320,265 Q320,305 280,305 L255,305 L235,335 L240,305 L200,305 Q160,305 160,265 Z" fill="url(#cg2)" opacity="0.9"/>
        <rect x="185" y="200" width="115" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
        <rect x="185" y="220" width="90" height="8" rx="4" fill="rgba(255,255,255,0.35)"/>
        <rect x="185" y="240" width="70" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
      </svg>
    </div>
    <h2 style="font-weight:800;letter-spacing:1px">FORUMM</h2>
    <p class="subtitle">Criar sua conta</p>
    <form id="cadastroForm">
      <div class="form-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Seu nome" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Criar Conta</button>
    </form>
    <div class="form-footer">
      Já tem conta? <a href="/login.html">Entrar</a>
    </div>
  </div>
</div>
</main>

<div id="footer-placeholder"></div>
<script>document.getElementById('footer-placeholder').innerHTML = '<script src="components/footer.js"><\/script>';</script>

<script>
document.getElementById('cadastroForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var btn = this.querySelector('button[type="submit"]');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Cadastrando...';

  window.go('POST', '/auth/cadastro', {
    nome: document.getElementById('nome').value,
    email: document.getElementById('email').value,
    senha: document.getElementById('senha').value
  }, function(r, status) {
    btn.disabled = false;
    btn.innerHTML = 'Criar Conta';
    if (r && r.success) {
      localStorage.setItem(window.APP_NAME + '_token', r.token);
      localStorage.setItem(window.APP_NAME + '_usuario', JSON.stringify(r.usuario));
      localStorage.setItem(window.APP_NAME + '_session_expiry', r.session_expiry || (Date.now() + 86400000));
      window.notificar('Conta criada com sucesso!', 'success');
      setTimeout(function() { window.location.href = '/'; }, 500);
    } else {
      window.notificar(r && r.error ? r.error : 'Erro ao cadastrar', 'error');
    }
  });
});
</script>
</body>
</html>
