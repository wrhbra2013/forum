<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - Fórum Respostas</title>
<link rel="stylesheet" href="static/css/default.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="static/js/api.js"></script>
</head>
<body>

<div id="header-placeholder"></div>
<script>document.getElementById('header-placeholder').innerHTML = '<script src="components/header.js"><\/script>';</script>

<main class="main-content">
<div class="auth-page">
  <div class="auth-card">
    <h2><i class="fas fa-user-plus" style="color:var(--primary)"></i> Criar Conta</h2>
    <p class="subtitle">Junte-se à comunidade Fórum Respostas</p>
    <form id="cadastroForm">
      <div class="form-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Seu nome" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Criar Conta</button>
    </form>
    <div class="form-footer">
      Já tem conta? <a href="/login.html">Entrar</a>
    </div>
  </div>
</div>
</main>

<div id="footer-placeholder"></div>
<script>document.getElementById('footer-placeholder').innerHTML = '<script src="components/footer.js"><\/script>';</script>

<script>
document.getElementById('cadastroForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var btn = this.querySelector('button[type="submit"]');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Cadastrando...';

  window.go('POST', '/auth/cadastro', {
    nome: document.getElementById('nome').value,
    email: document.getElementById('email').value,
    senha: document.getElementById('senha').value
  }, function(r, status) {
    btn.disabled = false;
    btn.innerHTML = 'Criar Conta';
    if (r && r.success) {
      localStorage.setItem(window.APP_NAME + '_token', r.token);
      localStorage.setItem(window.APP_NAME + '_usuario', JSON.stringify(r.usuario));
      localStorage.setItem(window.APP_NAME + '_session_expiry', r.session_expiry || (Date.now() + 86400000));
      window.notificar('Conta criada com sucesso!', 'success');
      setTimeout(function() { window.location.href = '/'; }, 500);
    } else {
      window.notificar(r && r.error ? r.error : 'Erro ao cadastrar', 'error');
    }
  });
});
</script>
</body>
</html>
