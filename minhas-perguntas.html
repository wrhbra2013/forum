<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minhas Perguntas - Fórum Respostas</title>
<link rel="stylesheet" href="static/css/default.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="static/js/api.js"></script>
</head>
<body>

<div id="header-placeholder"></div>
<script>document.getElementById('header-placeholder').innerHTML = '<script src="components/header.js"><\/script>';</script>

<main class="main-content">
<div class="container">
  <h1 class="section-title"><i class="fas fa-question-circle"></i> Minhas Perguntas</h1>
  <div id="minhasPerguntas"><div class="loading"><i class="fas fa-spinner"></i><p>Carregando...</p></div></div>
</div>
</main>

<div id="footer-placeholder"></div>
<script>document.getElementById('footer-placeholder').innerHTML = '<script src="components/footer.js"><\/script>';</script>

<script>
var usuario = window.getUsuario();
var token = window.getToken();

if (!token || !usuario) {
  window.location.href = '/login.html';
}

window.go('GET', '/perguntas?usuario_id=' + usuario.id + '&limite=50', null, function(r) {
  if (!r || !r.perguntas || r.perguntas.length === 0) {
    document.getElementById('minhasPerguntas').innerHTML = '<div class="empty-state"><i class="fas fa-question-circle"></i><h3>Você ainda não fez nenhuma pergunta</h3><a href="/nova-pergunta.html" class="btn btn-primary" style="margin-top:12px">Fazer Pergunta</a></div>';
    return;
  }
  document.getElementById('minhasPerguntas').innerHTML = r.perguntas.map(function(p) {
    var statusClass = 'status-' + (p.status || 'aberta');
    var statusLabel = p.status === 'resolvida' ? 'Resolvida' : p.status === 'fechada' ? 'Fechada' : 'Aberta';
    return '<div class="question-card">' +
      '<div class="question-card-header">' +
      '<h3><a href="/pergunta.html?id=' + p.id + '">' + window.esc(p.titulo) + '</a></h3>' +
      '<span class="status-badge ' + statusClass + '">' + statusLabel + '</span>' +
      '</div>' +
      '<div class="question-card-desc">' + window.esc((p.descricao || '').substring(0, 200)) + '</div>' +
      '<div class="question-card-footer">' +
      '<span>' + window.fmtDate(p.created_at) + '</span>' +
      '<div class="question-stats">' +
      '<span><i class="fas fa-reply"></i> ' + (p.total_respostas || 0) + '</span>' +
      '<span><i class="fas fa-eye"></i> ' + (p.visualizacoes || 0) + '</span>' +
      '</div></div></div>';
  }).join('');
});
</script>
</body>
</html>
