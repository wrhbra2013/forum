<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
    <linearGradient id="bubble1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#4834d4"/>
    </linearGradient>
    <linearGradient id="bubble2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#00a381"/>
    </linearGradient>
    <linearGradient id="bubble3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fd79a8"/>
      <stop offset="100%" style="stop-color:#e84393"/>
    </linearGradient>
    <filter id="shadow3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#2d3436" flood-opacity="0.25"/>
    </filter>
    <filter id="innerShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#000" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feComposite in="shadow" in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Background circle with 3D effect -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" filter="url(#shadow3d)"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- Chat bubble 1 (left) -->
  <g filter="url(#innerShadow)">
    <path d="M140,200 Q140,155 185,155 L270,155 Q315,155 315,200 L315,260 Q315,305 270,305 L245,305 L220,335 L225,305 L185,305 Q140,305 140,260 Z"
          fill="url(#bubble1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <!-- Text lines inside bubble 1 -->
    <rect x="165" y="185" width="120" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
    <rect x="165" y="205" width="90" height="8" rx="4" fill="rgba(255,255,255,0.35)"/>
    <rect x="165" y="225" width="105" height="8" rx="4" fill="rgba(255,255,255,0.35)"/>
    <rect x="165" y="245" width="70" height="8" rx="4" fill="rgba(255,255,255,0.25)"/>
    <rect x="165" y="265" width="55" height="8" rx="4" fill="rgba(255,255,255,0.2)"/>
  </g>

  <!-- Chat bubble 2 (right, slightly overlapped) -->
  <g filter="url(#innerShadow)">
    <path d="M230,200 Q230,165 265,165 L335,165 Q370,165 370,200 L370,250 Q370,285 335,285 L315,285 L295,310 L300,285 L265,285 Q230,285 230,250 Z"
          fill="url(#bubble2)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <rect x="250" y="190" width="95" height="7" rx="3.5" fill="rgba(255,255,255,0.5)"/>
    <rect x="250" y="207" width="75" height="7" rx="3.5" fill="rgba(255,255,255,0.35)"/>
    <rect x="250" y="224" width="85" height="7" rx="3.5" fill="rgba(255,255,255,0.35)"/>
    <rect x="250" y="241" width="55" height="7" rx="3.5" fill="rgba(255,255,255,0.25)"/>
  </g>

  <!-- Chat bubble 3 (top center, small accent) -->
  <g filter="url(#innerShadow)">
    <path d="M200,125 Q200,100 230,100 L280,100 Q310,100 310,125 L310,155 Q310,180 280,180 L270,180 L255,198 L258,180 L230,180 Q200,180 200,155 Z"
          fill="url(#bubble3)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <rect x="218" y="118" width="75" height="6" rx="3" fill="rgba(255,255,255,0.5)"/>
    <rect x="218" y="132" width="55" height="6" rx="3" fill="rgba(255,255,255,0.35)"/>
    <rect x="218" y="146" width="40" height="6" rx="3" fill="rgba(255,255,255,0.25)"/>
  </g>

  <!-- Glossy highlight -->
  <ellipse cx="200" cy="120" rx="100" ry="60" fill="url(#bubble1)" opacity="0.08" transform="rotate(-30,200,120)"/>
</svg>
